name: Daily AI News

# Runs every day at 01:30 UTC = 07:00 AM IST. Change the cron to adjust.
# You can also run it on demand from the Actions tab (workflow_dispatch).
on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily AI news digests
        env:
          # --- set these in the repo: Settings -> Secrets and variables -> Actions ---
          SEND_TO: ${{ secrets.SEND_TO }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          # GitHub Actions allows SMTP, so your Gmail App Password works here (free):
          SMTP_SENDER_EMAIL: ${{ secrets.SMTP_SENDER_EMAIL }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          # Optional: set RESEND_API_KEY instead of the SMTP secrets to use Resend.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Provider config (defaults are fine):
          PROVIDER: cohere
          COHERE_MODEL: command-r-08-2024
          USE_AI: "true"
        run: python news_agent.py
