# Render Blueprint — deploys the agent as a scheduled Cron Job.
# In Render: New + → Blueprint → connect this repo. Then set the secret env
# vars (marked sync:false) in the dashboard. Schedule is UTC.
#
# 30 1 * * *  =  01:30 UTC  =  07:00 AM IST.  (Adjust to your timezone.)
services:
  - type: cron
    name: ai-news-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "30 1 * * *"
    envVars:
      # Render BLOCKS outbound SMTP (ports 25/465/587), so in the cloud we send
      # over HTTPS via Resend (https://resend.com). SMTP is only for local runs.
      - key: MAILER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: "AI News Agent <onboarding@resend.dev>"
      - key: SEND_TO
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: PROVIDER
        value: cohere
      - key: COHERE_MODEL
        value: command-r-08-2024
      - key: USE_AI
        value: "true"
